<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Messaging App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .sidebar {
            width: 25%;
            background: #f5f5f5;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #ddd;
            background: #667eea;
            color: white;
        }

        .sidebar-header h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .new-conversation {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            background: white;
            transition: background 0.2s;
        }

        .new-conversation:hover {
            background: #efefef;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .conversation-item {
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-item:hover {
            background: #e8e8e8;
        }

        .conversation-item.active {
            background: #667eea;
            color: white;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 20px;
            color: #333;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            word-wrap: break-word;
            animation: slideIn 0.3s ease-in;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            align-self: flex-end;
            background: #667eea;
            color: white;
        }

        .message.received {
            align-self: flex-start;
            background: #e0e0e0;
            color: #333;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
            background: #fafafa;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #5568d3;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            font-size: 16px;
        }

        .setup-area {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .setup-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .setup-button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>💬 Messages</h2>
                <input type="text" id="newConversationInput" placeholder="New conversation..." class="new-conversation">
                <button onclick="createNewConversation()" class="new-conversation" style="margin-top: 5px;">+ New</button>
            </div>
            <div class="conversations-list" id="conversationsList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <h1 id="chatTitle">Select a conversation</h1>
                <div>
                    <input type="text" id="senderName" placeholder="Your name" style="padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">No messages yet. Start a conversation!</div>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let currentConversation = null;
        let senderName = 'User';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadConversations();
            document.getElementById('senderName').value = senderName;
            document.getElementById('senderName').addEventListener('change', (e) => {
                senderName = e.target.value || 'User';
            });
        });

        async function loadConversations() {
            try {
                const response = await fetch(`${API_URL}/conversations`);
                const conversations = await response.json();
                const list = document.getElementById('conversationsList');
                list.innerHTML = '';

                if (conversations.length === 0) {
                    list.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">No conversations yet</div>';
                    return;
                }

                conversations.forEach(conv => {
                    const div = document.createElement('div');
                    div.className = 'conversation-item';
                    if (conv === currentConversation) div.classList.add('active');
                    div.textContent = conv;
                    div.onclick = () => selectConversation(conv);
                    list.appendChild(div);
                });
            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        }

        function selectConversation(conversation) {
            currentConversation = conversation;
            document.getElementById('chatTitle').textContent = `💬 ${conversation}`;
            loadMessages();
            loadConversations();
        }

        async function loadMessages() {
            try {
                const response = await fetch(`${API_URL}/messages/${currentConversation}`);
                const messages = await response.json();
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';

                if (messages.length === 0) {
                    container.innerHTML = '<div class="empty-state">No messages in this conversation yet</div>';
                    return;
                }

                messages.forEach(msg => {
                    const msgEl = document.createElement('div');
                    msgEl.className = `message ${msg.sender === senderName ? 'sent' : 'received'}`;
                    const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    msgEl.innerHTML = `
                        <div>${msg.text}</div>
                        <div class="message-time">${msg.sender} • ${time}</div>
                    `;
                    container.appendChild(msgEl);
                });

                container.scrollTop = container.scrollHeight;
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text) return;
            if (!currentConversation) {
                alert('Please select or create a conversation first');
                return;
            }

            try {
                await fetch(`${API_URL}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text,
                        sender: senderName,
                        conversation: currentConversation
                    })
                });

                input.value = '';
                loadMessages();
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function createNewConversation() {
            const input = document.getElementById('newConversationInput');
            const name = input.value.trim();

            if (!name) {
                alert('Please enter a conversation name');
                return;
            }

            selectConversation(name);
            input.value = '';
        }

        // Auto-refresh messages every 2 seconds
        setInterval(() => {
            if (currentConversation) {
                loadMessages();
            }
        }, 2000);
    </script>
</body>
</html>
